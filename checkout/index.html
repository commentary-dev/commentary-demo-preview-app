<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout Review</title>
    <link rel="stylesheet" href="/commentary-demo-preview-app/styles.css">
    <script>
      (function configureCommentaryReviewParent() {
        var commentaryParentOrigins = ["https://commentary.dev", "https://staging.commentary.dev", "http://localhost:3000", "http://localhost:3001"];
        var allowedParentOrigins = new Set(commentaryParentOrigins);
        var referrerOrigin = document.referrer ? new URL(document.referrer).origin : "";
        window.__COMMENTARY_PARENT_ORIGINS__ = commentaryParentOrigins;
        window.__COMMENTARY_PARENT_ORIGIN__ = allowedParentOrigins.has(referrerOrigin) ? referrerOrigin : "https://commentary.dev";
      })();
      window.__COMMENTARY_COMMIT_SHA__ = "demo-preview-app-main";
      window.__COMMENTARY_BUILD_ID__ = "demo-preview-app-rich-routes";
    </script>
    <script src="/commentary-demo-preview-app/app.js" defer></script>
    <script src="https://cdn.commentary.dev/review-sdk/latest/commentary-review-sdk.js" defer></script>
  </head>
  <body>
    <div id="app" aria-live="polite"></div>
  </body>
</html>
